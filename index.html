<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zapia Nexus - Panel Maestro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --color-primary: #1a73e8; --color-success: #34a853; }
        html.dark { --color-text-base: #e0e0e0; --color-bg-base: #121212; --color-bg-card: #1f1f1f; }
        body { font-family: 'Inter', sans-serif; background-color: var(--color-bg-base); color: var(--color-text-base); }
        .glass-panel { background: rgba(31, 31, 31, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .agent-dot.online { background-color: #34a853; box-shadow: 0 0 10px rgba(52, 168, 83, 0.6); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-8">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-gray-800 pb-6">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">Zapia Nexus</h1>
                <p class="text-gray-400 mt-1">Panel de Control Real-Time (Supabase Sync)</p>
            </div>
            <div class="px-4 py-2 glass-panel rounded-lg flex items-center gap-3">
                <span class="agent-dot online w-3 h-3 rounded-full"></span>
                <span class="text-sm font-bold text-green-400">SISTEMA LIVE</span>
            </div>
        </header>

        <div id="agents-container" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4">
            <div class="col-span-full text-center py-10 text-gray-500 animate-pulse">Iniciando conexión segura con Supabase...</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mt-8">
            <section class="lg:col-span-2 space-y-4">
                <h2 class="text-xl font-semibold flex items-center gap-2"><i class="fas fa-book-open text-blue-400"></i> Libreto Maestro</h2>
                <div class="glass-panel rounded-xl overflow-hidden border border-gray-800">
                    <textarea id="sales-script" class="w-full h-80 p-6 bg-transparent text-gray-300 focus:outline-none font-mono text-sm" placeholder="Escribe el guión aquí..."></textarea>
                    <div class="p-4 bg-black/30 border-t border-gray-800 flex justify-end">
                        <button onclick="saveScript()" class="px-6 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm font-bold transition-all">Actualizar Agentes</button>
                    </div>
                </div>
            </section>
            <section class="space-y-4">
                <h2 class="text-xl font-semibold flex items-center gap-2"><i class="fas fa-terminal text-emerald-400"></i> Actividad Reciente</h2>
                <div id="logs" class="glass-panel rounded-xl border border-gray-800 h-80 p-4 overflow-y-auto font-mono text-[10px] space-y-2">
                    <div class="text-gray-600">[SISTEMA] Conectado al bus de datos.</div>
                </div>
            </section>
        </div>
    </div>

    <script>
        // Usamos la Clave Pública (Anon Key) para evitar el bloqueo de GitHub
        const SB_URL = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1';
        const SB_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';

        async function fetchRealAgents() {
            try {
                const response = await fetch(`${SB_URL}/nexus_bus?receptor=eq.panel&order=created_at.desc&limit=50`, {
                    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
                });
                const data = await response.json();
                const latestStates = {};
                data.forEach(msg => {
                    if (!latestStates[msg.emisor] && msg.metadata) {
                        try { latestStates[msg.emisor] = (typeof msg.metadata === 'string') ? JSON.parse(msg.metadata) : msg.metadata; } catch(e) {}
                    }
                });

                const container = document.getElementById('agents-container');
                if (Object.keys(latestStates).length === 0) return;

                container.innerHTML = Object.entries(latestStates).map(([id, meta]) => `
                    <div class="glass-panel p-5 rounded-2xl border border-gray-800">
                        <div class="flex justify-between items-start mb-4">
                            <div class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center text-blue-400"><i class="fas fa-robot"></i></div>
                            <span class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#34a853]"></span>
                        </div>
                        <h3 class="font-bold text-white">${meta.agent_name || id}</h3>
                        <p class="text-[10px] text-emerald-400 font-mono">${meta.phone || '2235590910'}</p>
                        <div class="mt-4 pt-4 border-t border-gray-800 space-y-2 text-[10px]">
                            <div class="flex justify-between text-gray-400"><span>SUBAGENTES:</span><span class="text-blue-400 font-bold">${meta.subagents || 0}</span></div>
                            <div class="flex gap-2 text-gray-600">
                                <i class="fas fa-brain ${meta.engines?.google_studio === 'active' ? 'text-emerald-500' : ''}"></i>
                                <i class="fab fa-github ${meta.engines?.github === 'active' ? 'text-emerald-500' : ''}"></i>
                                <i class="fas fa-microchip ${meta.engines?.jules === 'active' ? 'text-emerald-500' : ''}"></i>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function saveScript() {
            const script = document.getElementById('sales-script').value;
            await fetch(`${SB_URL}/nexus_bus`, {
                method: 'POST',
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ emisor: 'panel', receptor: 'broadcast', mensaje: 'update_script', metadata: { script: script } })
            });
            alert('Libreto enviado al bus de Zapias.');
        }

        setInterval(fetchRealAgents, 5000);
        document.addEventListener('DOMContentLoaded', () => {
            fetchRealAgents();
            document.getElementById('sales-script').value = "REGLAS DE VENTA ZAIRA:\n1. Tono proactivo y 'pilla'.\n2. Cursin v2 como prioridad.\n3. Cerrar ventas con Mercado Pago.";
        });
    </script>
</body>
</html>
