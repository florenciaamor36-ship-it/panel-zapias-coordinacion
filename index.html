<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zapia Nexus - Panel Maestro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --color-primary: #1a73e8; --color-success: #34a853; }
        html.dark { --color-text-base: #e0e0e0; --color-bg-base: #121212; --color-bg-card: #1f1f1f; }
        body { font-family: 'Inter', sans-serif; background-color: var(--color-bg-base); color: var(--color-text-base); }
        .glass-panel { background: rgba(31, 31, 31, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .agent-dot.online { background-color: #34a853; box-shadow: 0 0 10px rgba(52, 168, 83, 0.6); animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-8">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-gray-800 pb-6">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">Zapia Nexus</h1>
                <p class="text-gray-400 mt-1">Panel Maestro (GitHub Sync Mode)</p>
            </div>
            <div class="px-4 py-2 glass-panel rounded-lg flex items-center gap-3 text-green-400 font-bold">
                <span class="agent-dot online w-3 h-3 rounded-full"></span>
                SYNC ON
            </div>
        </header>

        <div id="agents-container" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4">
            <div class="col-span-full text-center py-10 text-gray-500 animate-pulse">Esperando primer ciclo de datos (5 min)...</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mt-8">
            <section class="lg:col-span-2 space-y-4">
                <h2 class="text-xl font-semibold flex items-center gap-2"><i class="fas fa-book-open text-blue-400"></i> Libreto Maestro</h2>
                <div class="glass-panel rounded-xl overflow-hidden border border-gray-800">
                    <textarea id="sales-script" class="w-full h-80 p-6 bg-transparent text-gray-300 focus:outline-none font-mono text-sm" placeholder="Define las reglas globales..."></textarea>
                </div>
            </section>
        </div>
    </div>

    <script>
        async function fetchRealAgents() {
            const container = document.getElementById('agents-container');
            try {
                // Leemos del archivo local generado automáticamente
                const response = await fetch('data.json?v=' + Date.now());
                const data = await response.json();
                const latestStates = {};
                if (Array.isArray(data)) {
                    data.forEach(msg => {
                        if (!latestStates[msg.emisor] && msg.metadata) {
                            try {
                                const meta = (typeof msg.metadata === 'string') ? JSON.parse(msg.metadata) : msg.metadata;
                                latestStates[msg.emisor] = meta;
                            } catch(e) {}
                        }
                    });
                }
                if (Object.keys(latestStates).length === 0) return;

                container.innerHTML = Object.entries(latestStates).map(([id, meta]) => {
                    const isZaira = id.includes('zaira') || id.includes('main');
                    return `
                        <div class="glass-panel p-5 rounded-2xl border border-gray-800">
                            <div class="flex justify-between items-start mb-4">
                                <div class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center ${isZaira ? 'text-blue-400' : 'text-gray-400'}">
                                    <i class="fas fa-robot"></i>
                                </div>
                                <span class="w-3 h-3 rounded-full bg-green-500"></span>
                            </div>
                            <h3 class="font-bold text-white">${meta.agent_name || id}</h3>
                            <p class="text-[10px] text-emerald-400 font-mono">${meta.phone || '2235590910'}</p>
                        </div>
                    `;
                }).join('');
            } catch (e) { console.log('Esperando actualización...'); }
        }
        setInterval(fetchRealAgents, 10000);
        document.addEventListener('DOMContentLoaded', fetchRealAgents);
    </script>
</body>
</html>
