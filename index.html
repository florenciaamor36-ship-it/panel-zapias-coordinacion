<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Orquestación Zapia</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400">Panel Central Zapia</h1>
            <div id="status-badge" class="px-3 py-1 rounded-full bg-green-900 text-green-300 text-sm">Sistema Online</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Estado de las Zapias -->
            <div class="card p-6 rounded-xl col-span-2">
                <h2 class="text-xl font-semibold mb-4 flex items-center">
                    <span class="mr-2">🤖</span> Estado de Agentes
                </h2>
                <div id="zapias-list" class="space-y-4">
                    <!-- Dinámico -->
                    <div class="animate-pulse flex space-x-4">
                        <div class="flex-1 space-y-4 py-1">
                            <div class="h-4 bg-slate-700 rounded w-3/4"></div>
                            <div class="h-4 bg-slate-700 rounded"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Libreto Maestro -->
            <div class="card p-6 rounded-xl">
                <h2 class="text-xl font-semibold mb-4">📖 Libreto Maestro</h2>
                <textarea id="libreto-text" class="w-full h-64 bg-slate-900 border border-slate-700 rounded p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Cargando instrucciones..."></textarea>
                <button onclick="saveLibreto()" class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition">
                    Guardar Cambios
                </button>
            </div>
        </div>

        <!-- Chat / Logs -->
        <div class="card p-6 rounded-xl mt-6">
            <h2 class="text-xl font-semibold mb-4">💬 Log de Actividad</h2>
            <div id="logs-container" class="h-48 overflow-y-auto bg-slate-900 rounded p-4 font-mono text-xs space-y-1">
                <!-- Logs dinámicos -->
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ypzudkxowpxvdggvongz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadData() {
            // Cargar Libreto
            const { data, error } = await supabase
                .from('system_state')
                .select('value')
                .eq('key', 'libreto_maestro')
                .single();
            
            if (data) document.getElementById('libreto-text').value = data.value;
            
            // Cargar Zapias (simulado por ahora)
            const zapias = [
                { name: 'Zapia Alpha', status: 'Activa', role: 'Ventas', last: 'Hace 2m' },
                { name: 'Zapia Beta', status: 'Standby', role: 'Soporte', last: 'Hace 15m' },
                { name: 'Zapia Gamma', status: 'Off', role: 'Ads', last: '-' }
            ];
            
            const list = document.getElementById('zapias-list');
            list.innerHTML = zapias.map(z => `
                <div class="flex items-center justify-between p-3 bg-slate-800 rounded-lg">
                    <div>
                        <p class="font-bold">${z.name} <span class="text-xs font-normal text-slate-400">(${z.role})</span></p>
                        <p class="text-xs text-slate-500">Última actividad: ${z.last}</p>
                    </div>
                    <span class="px-2 py-1 rounded text-xs ${z.status === 'Activa' ? 'bg-green-900 text-green-300' : 'bg-slate-700 text-slate-400'}">${z.status}</span>
                </div>
            `).join('');
        }

        async function saveLibreto() {
            const val = document.getElementById('libreto-text').value;
            const { error } = await supabase
                .from('system_state')
                .upsert({ key: 'libreto_maestro', value: val });
            
            if (error) alert('Error al guardar: ' + error.message);
            else alert('Libreto actualizado con éxito');
        }

        loadData();
    </script>
</body>
</html>
